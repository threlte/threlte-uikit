name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Install 🔧
        run: pnpm i

      - name: Lint 💅
        run: pnpm check

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Lint 💅
        run: pnpm lint

  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Install playwright 🔧
        run: npx playwright install chromium --with-deps

      - name: Test 🔬
        run: pnpm test
